<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টাকা ইনকাম সেন্টার</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11149595' data-sdk='show_11149595'></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 15px; padding-bottom: 90px; color: #333; }
        .page { display: none; } .page.active { display: block; }
        .top-app-title { font-size: 22px; font-weight: bold; text-align: center; color: #1e293b; margin: 15px 0; }
        .balance-card { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .btn-action { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .notice-bar { background: #fff; padding: 10px; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid #eee; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { cursor: pointer; font-weight: bold; }
        .nav-item.active { color: #2563eb; }
    </style>
</head>
<body>

    <div class="top-app-title">🚀 টাকা ইনকাম সেন্টার 🚀</div>

    <div id="page-home" class="page active">
        <div class="balance-card"><h3>মোট ব্যালেন্স</h3><h1 id="main-balance">0.00</h1></div>
        <div class="notice-bar">
            <marquee behavior="scroll" direction="left" scrollamount="4">
                🎉 নিয়মিত কাজ করুন | 💳 পেমেন্ট সিস্টেম খোলা | 🚀 ১১টি রেফার করলে পেমেন্ট ১০০% শিওর!
            </marquee>
        </div>
        <div style="background: white; padding: 15px; border-radius: 12px;">
            <p>⚡ সম্পন্ন টাস্ক: <span id="dash-task">0</span>/30</p>
            <p>⏳ বাকি ভিডিও: <span id="dash-remaining">30</span></p>
            <p>👥 মোট রেফার: <span id="dash-refer">0</span></p>
        </div>
        <div class="card" style="padding: 15px; margin-top: 20px;">
            <h3>👥 আপনার রেফারেল লিংক</h3>
            <input type="text" id="refer-link" class="input-field" readonly>
            <button class="btn-action" onclick="copyReferLink()">লিংক কপি করুন</button>
        </div>
    </div>
    
    <div id="page-work" class="page">
        <button class="btn-action" onclick="window.watchRealAd()">বিজ্ঞাপন দেখুন (২০ টাকা)</button>
        <button class="btn-action" id="btn-chan1" onclick="window.claimChannelBonus('chan1', 'https://t.me/ad16269')">চ্যানেল ১ (৫০ টাকা বোনাস)</button>
        <button class="btn-action" id="btn-chan2" onclick="window.claimChannelBonus('chan2', 'https://t.me/AK26269')">চ্যানেল ২ (৫০ টাকা বোনাস)</button>
    </div>

    <div id="page-wallet" class="page">
        <input type="number" id="withdraw-number" class="input-field" placeholder="বিকাশ/নগদ নাম্বার">
        <input type="number" id="withdraw-amount" class="input-field" placeholder="পরিমাণ (৫০০+)">
        <button class="btn-action" style="background:#10b981" onclick="window.processWithdraw()">উত্তোলন করুন</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('home', this)">🏠 হোম</div>
        <div class="nav-item" onclick="switchPage('work', this)">📋 কাজ</div>
        <div class="nav-item" onclick="switchPage('wallet', this)">💳 ওয়ালেট</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgOILqhT8ZxMZ--VZvKw3TdU2HB2RWWkw",
            authDomain: "takaincome-326cf.firebaseapp.com",
            projectId: "takaincome-326cf",
            storageBucket: "takaincome-326cf.firebasestorage.app",
            messagingSenderId: "27644737509",
            appId: "1:27644737509:web:bbad28493df31a8646a10c"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const userId = tg.initDataUnsafe.user ? String(tg.initDataUnsafe.user.id) : "guest";

        let bal = 0, task = 0, ref = 0;
        const DAILY_LIMIT = 30;

        async function checkDailyReset() {
            const lastDate = localStorage.getItem('last_task_date');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                task = 0;
                localStorage.setItem('last_task_date', today);
                await window.saveData();
            }
        }

        window.loadAllData = async () => {
            const userRef = doc(db, "users", userId);
            const docSnap = await getDoc(userRef);
            if (docSnap.exists()) {
                const d = docSnap.data();
                bal = d.balance; task = d.tasks; ref = d.refers;
            } else {
                await setDoc(userRef, { balance: 0, tasks: 0, refers: 0 });
            }
            await checkDailyReset();
            updateUI();
            document.getElementById('refer-link').value = "https://t.me/TakaInkam1626_bot?start=" + userId;
        };

        window.saveData = async () => await updateDoc(doc(db, "users", userId), { balance: bal, tasks: task, refers: ref });

        window.watchRealAd = async () => {
            await checkDailyReset();
            if (task >= DAILY_LIMIT) return alert("আজকের লিমিট শেষ!");
            if (typeof show_11149595 === 'function') {
                show_11149595().then(async () => {
                    bal += 20; task++;
                    await window.saveData(); updateUI();
                    alert("২০ টাকা যোগ হয়েছে!");
                });
            }
        };

        window.claimChannelBonus = async (id, url) => {
            if (localStorage.getItem('bonus_'+id+userId)) return alert("আগে বোনাস নিয়েছেন!");
            bal += 50; localStorage.setItem('bonus_'+id+userId, 'true');
            await window.saveData(); updateUI();
            window.open(url, '_blank');
        };

        window.processWithdraw = () => {
            const amt = parseFloat(document.getElementById("withdraw-amount").value);
            if (ref < 11) return alert("১১টি রেফার বাধ্যতামূলক!");
            if (amt < 500) return alert("সর্বনিম্ন ৫০০ টাকা!");
            tg.showPopup({title: 'অ্যাক্টিভ করুন', message: 'পেমেন্ট পেতে ১১১ টাকা ফি জমা দিন', buttons: [{id:'pay', text:'পেমেন্ট করুন'}]}, (id) => {
                if(id==='pay') tg.openLink("https://t.me/ks162699bot");
            });
        };

        window.copyReferLink = () => {
            navigator.clipboard.writeText(document.getElementById('refer-link').value);
            alert("লিংক কপি হয়েছে!");
        };

        window.switchPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            el.classList.add('active');
        };

        function updateUI() {
            document.getElementById('main-balance').innerText = bal.toFixed(2);
            document.getElementById('dash-task').innerText = task;
            document.getElementById('dash-remaining').innerText = (DAILY_LIMIT - task);
            document.getElementById('dash-refer').innerText = ref;
        }

        window.onload = window.loadAllData;
    </script>
</body>
</html>
