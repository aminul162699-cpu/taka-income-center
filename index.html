<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

/* ✅ SAFE USER ID (NO LOSS EVER) */
const userId = tg.initDataUnsafe?.user?.id?.toString() || null;

if (!userId) {
    tg.showAlert("Telegram user detect হয়নি");
}

/* DATA */
let userBalance = 0;
let totalTasks = 0;
let totalRefers = 0;

/* =========================
   🔥 LOAD + RECOVERY SYSTEM
========================= */
function loadAllData() {

    setInterval(rotateNotice, 7000);
    rotateNotice();

    /* 🔴 BALANCE RECOVERY (multiple key check) */
    const balanceKeys = [
        'bal_' + userId,
        'balance_' + userId,
        'wallet_' + userId
    ];

    let loadedBalance = false;

    balanceKeys.forEach(key => {
        tg.CloudStorage.getItem(key, (err, val) => {
            if (!loadedBalance && val !== null && val !== undefined) {
                userBalance = parseFloat(val) || 0;
                loadedBalance = true;
                updateUI();
            }
        });
    });

    /* TASK */
    tg.CloudStorage.getItem('task_' + userId, (err, val) => {
        totalTasks = parseInt(val) || 0;
        updateUI();
    });

    /* REFERRAL (old + new support) */
    const refKeys = ['ref_' + userId, 'refers_' + userId];

    let loadedRef = false;

    refKeys.forEach(key => {
        tg.CloudStorage.getItem(key, (err, val) => {
            if (!loadedRef && val !== null && val !== undefined) {
                totalRefers = parseInt(val) || 0;
                loadedRef = true;
                updateUI();
            }
        });
    });

    /* =========================
       🔥 REF SYSTEM FIX (ONLY ONCE)
    ========================== */
    const initData = tg.initDataUnsafe;

    if (initData && initData.start_param) {

        const referrerId = initData.start_param;

        const isNewUser = !localStorage.getItem("user_created_" + userId);

        if (isNewUser && referrerId && referrerId !== userId) {

            /* bonus balance */
            tg.CloudStorage.getItem('bal_' + referrerId, (err, val) => {
                let b = parseFloat(val) || 0;
                tg.CloudStorage.setItem('bal_' + referrerId, (b + 111).toString());
            });

            /* referral count */
            tg.CloudStorage.getItem('ref_' + referrerId, (err, val) => {
                let r = parseInt(val) || 0;
                tg.CloudStorage.setItem('ref_' + referrerId, (r + 1).toString());
            });

            localStorage.setItem("user_created_" + userId, "1");
        }
    }

    /* refer link */
    const el = document.getElementById("refer-link");
    if (el) {
        el.value = "https://t.me/YourBot?start=" + userId;
    }
}

/* =========================
   💾 SAVE DATA
========================= */
function saveAllData() {
    if (!userId) return;

    tg.CloudStorage.setItem('bal_' + userId, String(userBalance));
    tg.CloudStorage.setItem('task_' + userId, String(totalTasks));
    tg.CloudStorage.setItem('ref_' + userId, String(totalRefers));
}

/* =========================
   🧠 UI UPDATE
========================= */
function updateUI() {
    document.getElementById('main-balance').innerText = userBalance.toFixed(2);
    document.getElementById('wallet-balance').innerText = userBalance.toFixed(2);

    document.getElementById('dash-task').innerText = totalTasks;
    document.getElementById('dash-refer').innerText = totalRefers;
    document.getElementById('task-count').innerText = totalTasks;
}

/* =========================
   🎯 ADS REWARD
========================= */
function watchRealAd() {

    if (totalTasks >= 30) {
        tg.showAlert("আজকের লিমিট শেষ");
        return;
    }

    if (typeof show_11149595 === "function") {
        show_11149595().then(() => {
            userBalance += 20;
            totalTasks++;

            saveAllData();
            updateUI();

            tg.showAlert("২০ টাকা যোগ হয়েছে");
        });
    } else {
        tg.showAlert("অ্যাড লোড হচ্ছে...");
    }
}

/* =========================
   🔄 NOTICES
========================= */
const notices = [
    "বিকাশে টাকা উত্তোলন সফল",
    "নতুন ইউজার ইনকাম করছে",
    "আজ বোনাস চালু"
];

let n = 0;
function rotateNotice() {
    const el = document.getElementById("live-notice");
    if (el) {
        el.innerText = notices[n];
        n = (n + 1) % notices.length;
    }
}

/* =========================
   🔁 PAGE SWITCH
========================= */
function switchPage(id, el) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-" + id).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
}

/* =========================
   📥 WITHDRAW
========================= */
function processWithdraw() {

    const number = document.getElementById("withdraw-number").value;
    const amount = parseFloat(document.getElementById("withdraw-amount").value);

    if (!number || !amount) {
        tg.showAlert("সব পূরণ করুন");
        return;
    }

    if (amount < 500) {
        tg.showAlert("সর্বনিম্ন 500");
        return;
    }

    if (amount > userBalance) {
        tg.showAlert("ব্যালেন্স কম");
        return;
    }

    if (totalRefers < 11) {
        tg.showAlert("১১ রেফার দরকার");
        return;
    }

    tg.showPopup({
        title: "Withdraw Request",
        message: "আপনার অনুরোধ নেওয়া হয়েছে",
        buttons: [{ type: "ok", text: "OK" }]
    });
}

window.onload = loadAllData;
        </script>
